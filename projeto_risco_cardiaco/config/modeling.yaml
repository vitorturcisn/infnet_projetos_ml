# modeling.yaml — Arena de Modelos Preditores (Risco Cardíaco)
# ─────────────────────────────────────────────────────────────────────────────

pipeline:
  scaling:
    columns:
      - "Age"
      - "BMI"
      - "log_Triglyceride Level"
      - "cholesterol_bmi_ratio"
      - "triglyceride_age_index"
      - "age_x_bmi"
      - "Stress Level_encoded"

modeling:
  experiment_name: "cardiac-risk-arena-recall"
  tracking_uri: "sqlite:///mlruns.db"
  registry_name: "cardiac-risk-best"
  random_seed: 42

optimizer:
  strategy: "optuna"
  optuna:
    default_trials: 30
    sampler: "tpe"

# ── Redução de Dimensionalidade (Requisito Parte 4) ──
feature_reduction:
  method: "none"
  search_space:
    method:
      type: "categorical"
      choices: ["none", "pca", "lda"]
    n_components:
      type: "int"
      low: 2
      high: 7

# ── Métricas: Foco em Sensibilidade Clínica (Recall) ──
metrics:
  primary: "recall"
  additional: ["f1", "roc_auc", "precision", "accuracy"]

holdout:
  test_size: 0.20
  stratify_bins: 2

cv:
  strategy: "stratified_kfold"
  n_splits: 5
  shuffle: true

# ── A ARENA DE MODELOS ──
models:
  logistic_regression:
    enabled: true
    module: "sklearn.linear_model"
    class: "LogisticRegression"
    default_params:
      max_iter: 1000
      class_weight: "balanced"
    search_space:
      C:
        type: "log_float"
        low: 0.0001
        high: 100.0

  random_forest:
    enabled: true
    module: "sklearn.ensemble"
    class: "RandomForestClassifier"
    default_params:
      n_estimators: 100
      n_jobs: -1
      class_weight: "balanced"
    search_space:
      max_depth:
        type: "int"
        low: 5
        high: 20
      min_samples_split:
        type: "int"
        low: 2
        high: 10

  xgboost:
    enabled: true
    module: "xgboost"
    class: "XGBClassifier"
    default_params:
      n_estimators: 100
      n_jobs: -1
      eval_metric: "logloss"
      scale_pos_weight: 4
    search_space:
      max_depth:
        type: "int"
        low: 3
        high: 9
      learning_rate:
        type: "log_float"
        low: 0.01
        high: 0.2

  lightgbm:
    enabled: true
    module: "lightgbm"
    class: "LGBMClassifier"
    default_params:
      n_estimators: 100
      n_jobs: -1
      scale_pos_weight: 4
      verbosity: -1
    search_space:
      num_leaves:
        type: "int"
        low: 20
        high: 100
      learning_rate:
        type: "log_float"
        low: 0.01
        high: 0.2

ensembles:
  top_n_base_models: 2
  voting:
    enabled: true
    weight_low: 1
    weight_high: 5

artifacts:
  output_dir: "outputs/modeling"
  save_plots: true
  plots:
    - "confusion_matrix"
    - "roc_curve"
    - "feature_importance"
    - "optuna_optimization_history"