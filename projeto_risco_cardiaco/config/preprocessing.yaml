# preprocessing.yaml — Configuração para Risco Cardíaco
preprocessing:
  output_dir: "data/features"
  output_filename: "heart_disease_features.parquet"
  compression: "snappy"

imputation:
  - columns: ["Age", "Blood Pressure", "Cholesterol Level", "BMI", "Sleep Hours", 
              "Triglyceride Level", "Fasting Blood Sugar", "CRP Level", "Homocysteine Level"]
    strategy: "median"
  - columns: ["Alcohol Consumption"]
    strategy: "constant"
    fill_value: "Not Specified"
  - columns: ["Gender", "Exercise Habits", "Smoking", "Family Heart Disease", 
              "Diabetes", "High Blood Pressure", "Low HDL Cholesterol", 
              "High LDL Cholesterol", "Stress Level", "Sugar Consumption"]
    strategy: "constant"
    fill_value: "Unknown"

binary_flags:
  - column: "Blood Pressure"
    value: 140
    new_column: "is_hypertensive" 
    inference_safe: true
  - column: "BMI"
    value: 30
    new_column: "is_obese"
    inference_safe: true

ratio_features:
  - name: "cholesterol_bmi_ratio"
    numerator: "Cholesterol Level"
    denominator: "BMI"
  - name: "triglyceride_age_index"
    numerator: "Triglyceride Level"
    denominator: "Age"

log_transform:
  columns:
    - "Triglyceride Level"
    - "CRP Level"
    - "Homocysteine Level"

polynomial_features:
  - name: "age_x_bmi"
    columns: ["Age", "BMI"]

categorical_encoding:
  columns: ["Gender", "Stress Level", "Exercise Habits", "Smoking", "Diabetes"]
  one_hot_prefix: "cat"
  drop_first: false

feature_selection:
  target: "target_numeric"
  features_to_keep:
    - "Age"
    - "BMI"
    - "is_obese"
    - "is_hypertensive"
    - "cholesterol_bmi_ratio"
    - "triglyceride_age_index"
    - "age_x_bmi"
    - "log_Triglyceride Level"
    - "Stress Level_encoded"
    - "cat_Gender_Male"
    - "cat_Gender_Female"
    - "cat_Smoking_Yes"
    - "cat_Diabetes_Yes"
    - "target_numeric"